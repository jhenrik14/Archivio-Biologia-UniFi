<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivio Universitario di Biologia — UniFi</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --border-hover: #c8c4bb;
    --text: #1a1916;
    --text-muted: #706d66;
    --text-light: #a09c94;
    --accent: #2c4a7c;
    --accent-light: #e8edf5;
    --accent-muted: #6b88b5;
    --font-serif: 'Lora', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 6px;
    --radius-lg: 10px;
  }

  body.dark {
    --bg: #12121a;
    --surface: #1c1c28;
    --border: #2a2a3a;
    --border-hover: #3e3e54;
    --text: #e4e2dc;
    --text-muted: #9490a0;
    --text-light: #52506a;
    --accent: #7daad6;
    --accent-light: #181e2e;
    --accent-muted: #5580ae;
  }

  body {
    font-family: var(--font-serif);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden; /* Blocca lo scroll esterno */
    font-size: 15px;
    line-height: 1.6;
    transition: background 0.2s, color 0.2s;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    flex-shrink: 0;
    z-index: 100;
    transition: background 0.2s, border-color 0.2s;
  }

  .header-logo { height: 38px; margin-right: 12px; display: block; }
  .header-brand { display: flex; align-items: center; gap: 4px; }
  .header-brand-text { display: flex; flex-direction: column; }
  .header-brand h1 { font-size: 17px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.2; }
  .header-brand span { font-family: var(--font-mono); font-size: 11px; color: var(--text-light); letter-spacing: 0.05em; text-transform: uppercase; }
  
  .layout { flex: 1; display: flex; width: 100%; max-width: 1400px; margin: 0 auto; overflow: hidden; }

  .sidebar {
    width: 220px; flex-shrink: 0; padding: 1.5rem 1rem;
    border-right: 1px solid var(--border); background: var(--surface);
    height: 100%; overflow-y: auto;
  }

  .main { 
    flex: 1; padding: 1.5rem 2rem; min-width: 0; height: 100%; 
    overflow-y: scroll !important; /* Forza la barra per evitare spostamenti laterali */
  }

  /* Fix per evitare il salto verticale durante il caricamento */
  #file-container {
    min-height: 500px;
    display: flex;
    flex-direction: column;
  }

  .breadcrumb { 
    display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; 
    color: var(--text-light); margin-bottom: 1.25rem; white-space: nowrap; overflow-x: auto; scrollbar-width: none; 
  }
  .breadcrumb::-webkit-scrollbar { display: none; }
  .breadcrumb span { cursor: pointer; transition: color 0.12s; }
  .breadcrumb span:hover { color: var(--accent); }

  .stat-bar { display: flex; gap: 1rem; padding: 10px 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1.5rem; }
  .stat { text-align: center; flex: 1; }
  .stat .stat-val { font-family: var(--font-mono); font-size: 17px; font-weight: 500; color: var(--accent); }

  .file-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 4px; }
  .file-row:hover { border-color: var(--border-hover); background: var(--bg); }
  .file-name { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .footer { 
    flex-shrink: 0; padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); 
    text-align: center; font-size: 12px; color: var(--text-muted); 
  }
  .footer-content { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
  .email-inline { color: var(--accent); text-decoration: none; font-family: var(--font-mono); font-weight: 500; padding: 2px 6px; border-radius: 4px; background: var(--accent-light); }

  .theme-toggle { display: flex; align-items: center; gap: 7px; }
  .toggle-track { width: 42px; height: 22px; border-radius: 11px; background: var(--border); position: relative; cursor: pointer; }
  .toggle-track::after { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--text-light); top: 2px; left: 2px; transition: transform 0.2s; }
  body.dark .toggle-track { background: var(--accent); }
  body.dark .toggle-track::after { transform: translateX(20px); background: #fff; }

  button.icon-btn { padding: 6px 8px; cursor: pointer; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); }
  button.icon-btn.active { background: var(--bg); border-color: var(--accent); }

  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 700px) { .sidebar { display: none; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <img src="logo.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
    <div class="header-brand-text">
      <h1>Archivio Universitario di Biologia</h1>
      <span id="header-sub">UniFi</span>
    </div>
  </div>
  <div class="header-right" style="display:flex; align-items:center; gap:15px;">
    <div class="theme-toggle" onclick="toggleTheme()">
      <span class="toggle-icon">☀️</span>
      <div class="toggle-track"></div>
      <span class="toggle-icon">🌙</span>
    </div>
    <div class="view-toggle">
      <button class="icon-btn active" id="btn-list" onclick="setView('list')">☰</button>
      <button class="icon-btn" id="btn-grid" onclick="setView('grid')">⊞</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Semestri</div>
    <ul class="nav-list" id="nav-list">
      <li class="nav-item active" id="nav-root" onclick="navRoot()">🏠 Tutti i semestri</li>
    </ul>
  </nav>

  <main class="main">
    <div class="breadcrumb" id="breadcrumb"><span>🏠 UniFi</span></div>
    
    <div class="stat-bar">
      <div class="stat"><div class="stat-val" id="s-folders">—</div><div class="stat-lbl">Cartelle</div></div>
      <div class="stat"><div class="stat-val" id="s-files">—</div><div class="stat-lbl">File</div></div>
      <div class="stat"><div class="stat-val" id="s-pdfs">—</div><div class="stat-lbl">PDF</div></div>
      <div class="stat"><div class="stat-val" id="s-visits">—</div><div class="stat-lbl">Visite</div></div>
    </div>

    <div class="toolbar" style="display:flex; gap:10px; margin-bottom:1.25rem;">
      <input type="text" id="search-input" placeholder="Cerca file..." oninput="render()" style="flex:1; padding:8px; border:1px solid var(--border); border-radius:var(--radius);">
      <select id="type-filter" onchange="render()" style="padding:8px; border:1px solid var(--border); border-radius:var(--radius);">
        <option value="">Tutti i tipi</option>
        <option value="folder">Cartelle</option>
        <option value="pdf">PDF</option>
      </select>
    </div>

    <div id="file-container">
      <div class="state-box"><span class="ico spin">⟳</span><p>Caricamento file…</p></div>
    </div>
  </main>
</div>

<footer class="footer">
  <div class="footer-content">
    <span>Hai materiale da condividere? Scrivici a:</span>
    <a href="mailto:archivio_biologia_free@proton.me?subject=Invio Materiale Didattico" class="email-inline">archivio_biologia_free@proton.me</a>
    <span class="footer-sep">|</span>
    <span class="footer-disclaimer">Materiale condiviso in forma anonima a solo scopo didattico senza fini di lucro.</span>
  </div>
</footer>

<script>
const API_KEY = 'AIzaSyCK1qxkszf-Zvwovt2QgYzru4cIkkIBVdE';
const ROOT_ID = '14WaurkHwQIuqCs7cPN-nNYLlax0xpfRD';
let currentId = ROOT_ID, stack = [], allItems = [], currentView = 'list';

function toggleTheme() {
  const dark = document.body.classList.toggle('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}
(function() {
  const s = localStorage.getItem('theme');
  if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.body.classList.add('dark');
})();

async function updateVisitCounter() {
  try {
    const res = await fetch(`https://api.counterapi.dev/v1/jhenrik14_biologia/visits/up`);
    const d = await res.json();
    if(d.count) document.getElementById('s-visits').textContent = d.count.toLocaleString();
  } catch(e) { document.getElementById('s-visits').textContent = "—"; }
}

async function fetchItems(id) {
  let items = [], token = '';
  do {
    const url = `https://www.googleapis.com/drive/v3/files?q='${id}'+in+parents+and+trashed=false&fields=nextPageToken,files(id,name,mimeType,size,modifiedTime)&orderBy=folder,name&pageSize=200&key=${API_KEY}${token?'&pageToken='+token:''}`;
    const res = await fetch(url);
    const d = await res.json();
    items = items.concat(d.files || []);
    token = d.nextPageToken || '';
  } while(token);
  return items.filter(f => !f.name.startsWith('_'));
}

async function loadFolder(id, name) {
  const cont = document.getElementById('file-container');
  cont.innerHTML = `<div class="state-box"><span class="ico spin">⟳</span><p>Caricamento...</p></div>`;
  try {
    allItems = await fetchItems(id);
    currentId = id;
    updateBreadcrumb(name);
    updateStats(allItems);
    if (id === ROOT_ID) buildSidebar(allItems.filter(f => f.mimeType.includes('folder')));
    render();
  } catch(e) { cont.innerHTML = `<div class="state-box">⚠️ Errore</div>`; }
}

function buildSidebar(folders) {
  const list = document.getElementById('nav-list');
  let html = `<li class="nav-item active" id="nav-root" onclick="navRoot()">🏠 Tutti i semestri</li>`;
  folders.sort((a,b) => a.name.localeCompare(b.name));
  let lastYear = null;
  folders.forEach(f => {
    const match = f.name.match(/\d/);
    const year = match ? match[0] : null;
    if (year && year !== lastYear) {
      lastYear = year;
      html += `<div style="margin:18px 10px 8px; border-top:1px solid var(--border); padding-top:10px; font-family:var(--font-mono); font-size:10px; color:var(--text-light); text-transform:uppercase; letter-spacing:0.1em; font-weight:500;">${year}° Anno</div>`;
    }
    html += `<li class="nav-item" onclick="jumpToFolder('${f.id}','${f.name.replace(/'/g,"\\'")}')">📅 ${f.name.length>22?f.name.slice(0,20)+'…':f.name}</li>`;
  });
  list.innerHTML = html;
}

function render() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const type = document.getElementById('type-filter').value;
  const filtered = allItems.filter(f => {
    if(!f.name.toLowerCase().includes(q)) return false;
    if(type==='pdf') return f.mimeType==='application/pdf';
    if(type==='folder') return f.mimeType.includes('folder');
    return true;
  });
  const cont = document.getElementById('file-container');
  if(!filtered.length) { cont.innerHTML = `<div class="state-box">Nessun file trovato</div>`; return; }
  cont.innerHTML = currentView === 'grid' ? `<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px;">${filtered.map(cardHTML).join('')}</div>` : `<div class="files-list">${filtered.map(rowHTML).join('')}</div>`;
}

function rowHTML(f) {
  const isF = f.mimeType.includes('folder');
  const click = isF ? `enterFolder('${f.id}','${f.name.replace(/'/g,"\\'")}')` : `openFile('${f.id}')`;
  return `<div class="file-row" onclick="${click}"><span>${isF?'📁':'📄'}</span><span class="file-name">${f.name}</span></div>`;
}

function cardHTML(f) {
  const isF = f.mimeType.includes('folder');
  const click = isF ? `enterFolder('${f.id}','${f.name.replace(/'/g,"\\'")}')` : `openFile('${f.id}')`;
  return `<div style="border:1px solid var(--border); padding:15px; border-radius:var(--radius); cursor:pointer; background:var(--surface);" onclick="${click}"><div style="font-size:20px;">${isF?'📁':'📄'}</div><div style="font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${f.name}</div></div>`;
}

function updateBreadcrumb(name) {
  let html = `<span onclick="navRoot()">🏠 UniFi</span>`;
  stack.forEach((item, i) => { if(item.id !== ROOT_ID) html += ` <span style="opacity:0.3">›</span> <span onclick="navStack(${i})">${item.name}</span>`; });
  if(currentId !== ROOT_ID) html += ` <span style="opacity:0.3">›</span> <span style="color:var(--text-muted)">${name}</span>`;
  document.getElementById('breadcrumb').innerHTML = html;
}

function enterFolder(id, name) {
  stack.push({ id: currentId, name: document.getElementById('header-sub').textContent });
  window.history.pushState({ folderId: id, folderName: name, stack: [...stack] }, "", '?f='+id);
  loadFolder(id, name);
}

function jumpToFolder(id, name) {
  stack = [];
  window.history.pushState({ folderId: id, folderName: name, stack: [] }, "", '?f='+id);
  loadFolder(id, name);
}

function navRoot() { stack = []; window.history.pushState({}, "", window.location.pathname); loadFolder(ROOT_ID, "UniFi"); }
function navStack(i) { const t=stack[i]; stack=stack.slice(0,i); loadFolder(t.id, t.name); }
function updateStats(items) {
  document.getElementById('s-folders').textContent = items.filter(f=>f.mimeType.includes('folder')).length;
  document.getElementById('s-files').textContent = items.filter(f=>!f.mimeType.includes('folder')).length;
  document.getElementById('s-pdfs').textContent = items.filter(f=>f.mimeType==='application/pdf').length;
}
function setView(v) { 
  currentView=v; 
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  document.getElementById('btn-grid').classList.toggle('active', v==='grid');
  render(); 
}
function openFile(id) { window.open(`https://drive.google.com/file/d/${id}/view`,'_blank'); }

(function() {
  updateVisitCounter();
  const params = new URLSearchParams(window.location.search);
  const fId = params.get('f');
  loadFolder(fId || ROOT_ID, fId ? "Cartella" : "UniFi");
})();
</script>
</body>
</html>
