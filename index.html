<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivio Universitario di Biologia — UniFi</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --border-hover: #c8c4bb;
    --text: #1a1916;
    --text-muted: #706d66;
    --text-light: #a09c94;
    --accent: #2c4a7c;
    --accent-light: #e8edf5;
    --accent-muted: #6b88b5;
    --font-serif: 'Lora', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 6px;
    --radius-lg: 10px;
  }

  body.dark {
    --bg: #12121a;
    --surface: #1c1c28;
    --border: #2a2a3a;
    --border-hover: #3e3e54;
    --text: #e4e2dc;
    --text-muted: #9490a0;
    --text-light: #52506a;
    --accent: #7daad6;
    --accent-light: #181e2e;
    --accent-muted: #5580ae;
  }

  /* STRUTTURA APPLICATIVO (FIX EFFETTO MOLLA) */
  html, body {
    height: 100vh;
    overflow: hidden; /* Impedisce lo scroll della pagina intera */
  }

  body {
    font-family: var(--font-serif);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    transition: background 0.2s;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    flex-shrink: 0;
    z-index: 100;
  }

  .layout {
    flex: 1;
    display: flex;
    max-width: 1440px;
    margin: 0 auto;
    width: 100%;
    overflow: hidden; /* Blocca l'espansione del layout */
  }

  .sidebar {
    width: 230px;
    flex-shrink: 0;
    padding: 1.5rem 1rem;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    height: 100%;
  }

  .main {
    flex: 1;
    padding: 1.5rem 2rem;
    min-width: 0;
    height: 100%;
    overflow-y: scroll; /* FORZA la barra laterale per evitare spostamenti laterali */
    display: flex;
    flex-direction: column;
  }

  .footer {
    flex-shrink: 0;
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* COMPONENTI */
  .header-logo { height: 38px; margin-right: 12px; border-radius: 50%; }
  .header-brand { display: flex; align-items: center; gap: 4px; }
  .header-brand h1 { font-size: 17px; font-weight: 500; line-height: 1.2; }
  .header-brand span { font-family: var(--font-mono); font-size: 11px; color: var(--text-light); text-transform: uppercase; }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-light);
    margin-bottom: 1.25rem;
    white-space: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  .breadcrumb::-webkit-scrollbar { display: none; }
  .breadcrumb span { cursor: pointer; transition: color 0.12s; }
  .breadcrumb span:hover { color: var(--accent); }

  .stat-bar { display: flex; gap: 1rem; padding: 10px 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1.5rem; flex-shrink: 0; }
  .stat { text-align: center; flex: 1; }
  .stat .stat-val { font-family: var(--font-mono); font-size: 17px; font-weight: 500; color: var(--accent); }

  #file-container {
    flex: 1;
    min-height: 450px; /* PRENOTA lo spazio per evitare che il footer salti su */
    display: flex;
    flex-direction: column;
  }

  .state-box {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 0;
  }

  .file-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.12s; margin-bottom: 4px; }
  .file-row:hover { border-color: var(--border-hover); background: var(--bg); }
  .file-row .file-name { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .email-inline { color: var(--accent); text-decoration: none; font-family: var(--font-mono); font-weight: 500; padding: 2px 6px; border-radius: 4px; background: var(--accent-light); }
  
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .theme-toggle { display: flex; align-items: center; gap: 7px; }
  .toggle-track { width: 42px; height: 22px; border-radius: 11px; background: var(--border); position: relative; cursor: pointer; }
  .toggle-track::after { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--text-light); top: 2px; left: 2px; transition: transform 0.2s; }
  body.dark .toggle-track { background: var(--accent); }
  body.dark .toggle-track::after { transform: translateX(20px); background: #fff; }

  @media (max-width: 850px) { .sidebar { display: none; } .main { padding: 1rem; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <img src="logo.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
    <div class="header-brand-text">
      <h1>Archivio Universitario di Biologia</h1>
      <span id="header-sub">UniFi</span>
    </div>
  </div>
  <div class="header-right">
    <div class="theme-toggle" onclick="toggleTheme()">
      <span class="toggle-icon">☀️</span>
      <div class="toggle-track"></div>
      <span class="toggle-icon">🌙</span>
    </div>
    <div class="view-toggle" style="margin-left:15px; display: flex; gap:5px;">
      <button id="btn-list" style="padding: 5px 10px;" onclick="setView('list')">☰</button>
      <button id="btn-grid" style="padding: 5px 10px;" onclick="setView('grid')">⊞</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Navigazione</div>
    <ul class="nav-list" id="nav-list">
      <li class="nav-item active" id="nav-root" onclick="navRoot()">
        <span class="ni">🏠</span> Tutti i semestri
      </li>
    </ul>
  </nav>

  <main class="main">
    <div class="breadcrumb" id="breadcrumb">
      <span onclick="navRoot()">🏠 UniFi</span>
    </div>
    
    <div class="stat-bar">
      <div class="stat"><div class="stat-val" id="s-folders">—</div><div class="stat-lbl">Cartelle</div></div>
      <div class="stat"><div class="stat-val" id="s-files">—</div><div class="stat-lbl">File</div></div>
      <div class="stat"><div class="stat-val" id="s-pdfs">—</div><div class="stat-lbl">PDF</div></div>
      <div class="stat"><div class="stat-val" id="s-visits">—</div><div class="stat-lbl">Visite</div></div>
    </div>

    <div class="toolbar" style="display:flex; gap:10px; margin-bottom:1.5rem;">
      <input type="text" id="search-input" placeholder="Cerca nell'archivio..." oninput="render()" style="flex:1; padding:8px; border:1px solid var(--border); border-radius:var(--radius);">
      <select id="type-filter" onchange="render()" style="padding:8px; border:1px solid var(--border); border-radius:var(--radius);">
        <option value="">Tutti i file</option>
        <option value="pdf">PDF</option>
        <option value="folder">Cartelle</option>
      </select>
    </div>

    <div id="file-container">
      <div class="state-box"><span class="ico spin">⟳</span><p>Caricamento file…</p></div>
    </div>
  </main>
</div>

<footer class="footer">
  <div class="footer-content" style="display:flex; justify-content:center; align-items:center; gap:10px; flex-wrap:wrap;">
    <span>Hai materiale? Scrivici:</span>
    <a href="mailto:archivio_biologia_free@proton.me?subject=Invio Materiale" class="email-inline">archivio_biologia_free@proton.me</a>
    <span style="opacity:0.4">|</span>
    <span style="font-style:italic; opacity:0.7">Solo scopo didattico.</span>
  </div>
</footer>

<script>
const API_KEY = 'AIzaSyCK1qxkszf-Zvwovt2QgYzru4cIkkIBVdE';
const ROOT_ID = '14WaurkHwQIuqCs7cPN-nNYLlax0xpfRD';
let currentId = ROOT_ID, stack = [], allItems = [], currentView = 'list';

function toggleTheme() {
  const dark = document.body.classList.toggle('dark');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}

(function() {
  const s = localStorage.getItem('theme');
  if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches))
    document.body.classList.add('dark');
})();

async function updateVisitCounter() {
  try {
    const res = await fetch(`https://api.counterapi.dev/v1/jhenrik14_biologia/visits/up`);
    const data = await res.json();
    if (data.count) document.getElementById('s-visits').textContent = data.count.toLocaleString();
  } catch (e) { document.getElementById('s-visits').textContent = "—"; }
}

async function fetchItems(folderId) {
  let items = [], pageToken = '';
  do {
    const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,files(id,name,mimeType,size,modifiedTime)&orderBy=folder,name&pageSize=200&key=${API_KEY}${pageToken?'&pageToken='+pageToken:''}`;
    const res = await fetch(url);
    const d = await res.json();
    items = items.concat(d.files || []);
    pageToken = d.nextPageToken || '';
  } while (pageToken);
  return items.filter(f => !f.name.startsWith('_'));
}

async function loadFolder(id, name) {
  const container = document.getElementById('file-container');
  // Il contenitore NON viene svuotato subito per evitare il salto bianco totale, 
  // ma mostra l'overlay di caricamento sopra l'altezza minima definita nel CSS.
  container.innerHTML = `<div class="state-box"><span class="ico spin">⟳</span><p>Accesso a ${name}...</p></div>`;
  try {
    allItems = await fetchItems(id);
    currentId = id;
    updateBreadcrumb(name);
    updateStats(allItems);
    if (id === ROOT_ID) buildSidebar(allItems.filter(f => f.mimeType.includes('folder')));
    render();
  } catch(e) {
    container.innerHTML = `<div class="state-box">⚠️ Errore caricamento</div>`;
  }
}

function render() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const type = document.getElementById('type-filter').value;
  const filtered = allItems.filter(f => {
    if (!f.name.toLowerCase().includes(q)) return false;
    if (type === 'pdf') return f.mimeType === 'application/pdf';
    if (type === 'folder') return f.mimeType.includes('folder');
    return true;
  });
  
  const cont = document.getElementById('file-container');
  if (!filtered.length) { cont.innerHTML = `<div class="state-box">Nessun file trovato</div>`; return; }
  
  cont.innerHTML = currentView === 'grid' 
    ? `<div class="files-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px;">${filtered.map(cardHTML).join('')}</div>`
    : `<div class="files-list">${filtered.map(rowHTML).join('')}</div>`;
}

function rowHTML(f) {
  const isF = f.mimeType.includes('folder');
  const click = isF ? `enterFolder('${f.id}','${f.name.replace(/'/g,"\\'")}')` : `openFile('${f.id}')`;
  return `<div class="file-row" onclick="${click}">
    <span>${isF?'📁':'📄'}</span>
    <span class="file-name">${f.name}</span>
    <span style="font-size:10px; opacity:0.5">${f.size?Math.round(f.size/1024)+'KB':''}</span>
  </div>`;
}

function cardHTML(f) {
  const isF = f.mimeType.includes('folder');
  const click = isF ? `enterFolder('${f.id}','${f.name.replace(/'/g,"\\'")}')` : `openFile('${f.id}')`;
  return `<div style="border:1px solid var(--border); padding:15px; border-radius:10px; cursor:pointer; background:var(--surface);" onclick="${click}">
    <div style="font-size:24px; margin-bottom:10px;">${isF?'📁':'📄'}</div>
    <div style="font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${f.name}</div>
  </div>`;
}

function updateBreadcrumb(name) {
  let html = `<span onclick="navRoot()">🏠 UniFi</span>`;
  stack.forEach((item, i) => { if(item.id !== ROOT_ID) html += ` <span style="opacity:0.3">›</span> <span onclick="navStack(${i})">${item.name}</span>`; });
  if (id_is_not_root(currentId)) html += ` <span style="opacity:0.3">›</span> <span style="font-weight:500">${name}</span>`;
  document.getElementById('breadcrumb').innerHTML = html;
}

function id_is_not_root(id) { return id !== ROOT_ID; }

function enterFolder(id, name) {
  stack.push({ id: currentId, name: document.getElementById('header-sub').textContent });
  const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?f=' + id;
  window.history.pushState({ folderId: id, folderName: name, stack: [...stack] }, "", newUrl);
  loadFolder(id, name);
}

function jumpToFolder(id, name) {
  stack = [];
  const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?f=' + id;
  window.history.pushState({ folderId: id, folderName: name, stack: [] }, "", newUrl);
  loadFolder(id, name);
}

function navRoot() {
  stack = [];
  window.history.pushState({}, "", window.location.pathname);
  loadFolder(ROOT_ID, "UniFi");
}

function navStack(i) {
  const t=stack[i]; stack=stack.slice(0,i);
  loadFolder(t.id, t.name);
}

function buildSidebar(folders) {
  const container = document.getElementById('nav-list');
  let html = `<li class="nav-item" onclick="navRoot()">🏠 Home</li>`;
  folders.sort((a,b)=>a.name.localeCompare(b.name)).forEach(f => {
    html += `<li class="nav-item" style="padding:8px; cursor:pointer;" onclick="jumpToFolder('${f.id}','${f.name.replace(/'/g,"\\'")}')">📅 ${f.name}</li>`;
  });
  container.innerHTML = html;
}

function updateStats(items) {
  document.getElementById('s-folders').textContent = items.filter(f=>f.mimeType.includes('folder')).length;
  document.getElementById('s-files').textContent = items.filter(f=>!f.mimeType.includes('folder')).length;
  document.getElementById('s-pdfs').textContent = items.filter(f=>f.mimeType==='application/pdf').length;
}

function openFile(id) { window.open(`https://drive.google.com/file/d/${id}/view`,'_blank'); }
function setView(v) { currentView=v; render(); }

(function() {
  updateVisitCounter();
  const params = new URLSearchParams(window.location.search);
  const fId = params.get('f');
  loadFolder(fId || ROOT_ID, fId ? "Cartella" : "UniFi");
})();
</script>
</body>
</html>
